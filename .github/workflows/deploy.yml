name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGION: us-central1
  SERVICE: chalkmind
  REGISTRY: us-central1-docker.pkg.dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/chalkmind/chalkmind"
          docker build \
            --build-arg VITE_GA_MEASUREMENT_ID=${{ vars.VITE_GA_MEASUREMENT_ID }} \
            --build-arg VITE_RECAPTCHA_SITE_KEY=${{ vars.VITE_RECAPTCHA_SITE_KEY }} \
            -t "${IMAGE}:${{ github.sha }}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/chalkmind/chalkmind:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --session-affinity
            --memory=1Gi
            --timeout=3600
            --min-instances=0
            --max-instances=3
          env_vars: |
            RECAPTCHA_ENABLED=${{ vars.RECAPTCHA_ENABLED }}
            LANGFUSE_BASE_URL=${{ vars.LANGFUSE_BASE_URL }}
            RATE_LIMIT=${{ vars.RATE_LIMIT }}
          secrets: |
            GOOGLE_API_KEY=GOOGLE_API_KEY:latest
            RECAPTCHA_SECRET_KEY=RECAPTCHA_SECRET_KEY:latest
            LANGFUSE_SECRET_KEY=LANGFUSE_SECRET_KEY:latest
            LANGFUSE_PUBLIC_KEY=LANGFUSE_PUBLIC_KEY:latest
